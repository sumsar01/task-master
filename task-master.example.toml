# task-master.toml — copy this file to task-master.toml and fill in your own values.
# task-master.toml is gitignored so your project names stay private.

# ── UI / Appearance ───────────────────────────────────────────────────────────
# Available themes: tokyonight, gruvbox, catppuccin, nord, dracula, rosepine
# The TUI theme picker (press t) writes this field automatically.
[ui]
theme = "tokyonight"

# Each [[projects]] block registers one git repository.
#
# Fields:
#   name      — full repo/directory name under projects/
#   short     — short prefix used for tmux window names (e.g. "API" → "API-main")
#   repo      — path relative to this file where the bare repo / worktrees live
#   collapsed — (optional) hide the project's worktree rows in the TUI list.
#               Toggle with Enter/Space when the project header is selected.
#               The TUI writes this field automatically when you collapse/expand.
#   group     — (optional) super-group label for the TUI list (e.g. "Work", "Personal").
#               Projects sharing the same group value are shown under a collapsible
#               GroupHeader row.  Projects without a group are listed under "Ungrouped".
#               Toggle a group open/closed with Enter/Space on its header row.
#               The TUI writes group collapse state to [group_states] automatically.
#   context   — (optional) bounded-context tag for future filter/grouping
#               (e.g. "warehouse", "fulfillment").  Stored but not displayed yet.
#   git_name  — (optional) git user.name to use for commits in this project's worktrees.
#   git_email — (optional) git user.email to use for commits in this project's worktrees.
#               Set both git_name and git_email when the worktrees live under a path that
#               triggers an unintended includeIf rule in ~/.gitconfig.  task-master writes
#               these values into the bare repo's git config so all linked worktrees inherit
#               the correct identity automatically.  Run `task-master fix-git-identity` once
#               to apply the values to existing bare repos.
#
# Each [[projects.worktrees]] block registers one worktree inside that repo.
#   name   — worktree directory name; also becomes the window suffix

[[projects]]
name = "my-service"
short = "SVC"
repo = "projects/my-service"
group = "Whiteaway"                 # super-group shown in TUI
context = "delivery-and-logistics"  # bounded-context tag (for future filtering)

  [[projects.worktrees]]
  name = "main"

  [[projects.worktrees]]
  name = "feature"

[[projects]]
name = "another-project"
short = "AP"
repo = "projects/another-project"
group = "Personal"

  [[projects.worktrees]]
  name = "main"
